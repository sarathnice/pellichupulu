name: preprod-gate

on:
  workflow_dispatch:

jobs:
  staging-gate:
    runs-on: ubuntu-latest
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN_NONPROD }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      STAGING_API_URL: ${{ secrets.STAGING_API_URL }}
      TURNSTILE_BYPASS_TOKEN: ${{ secrets.TURNSTILE_BYPASS_TOKEN }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Run pre-production gate
        run: node ./scripts/preprod-gate.mjs

      - name: Upload gate report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: preprod-gate-report
          path: outputs/preprod-gate-report-*.md
          if-no-files-found: warn
